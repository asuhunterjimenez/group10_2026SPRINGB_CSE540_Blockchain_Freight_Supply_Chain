{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pay Balance</title>

  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>

<body>

  <div class="container mt-5">

    <center class="text-success">
      <h2>Pay Balance (ETH)</h2>
    </center>

    <form id="payment-form">
      {% csrf_token %}

      <input type="hidden" name="service_type" value="{{ service_type }}">
      <input type="hidden" name="customer_email" value="{{ customer_email }}">
      <input type="hidden" name="booking_id" value="{{ booking_id }}">
      <input type="hidden" name="quote_request_id" value="{{ quote_request }}">
      <input type="hidden" name="total_charges" value="{{ total_charges }}">

      <input type="hidden" id="wallet_address" name="wallet_address">
      <input type="hidden" id="transaction_hash" name="transaction_hash">
      <input type="hidden" id="transaction_id" name="transaction_id">
      <input type="hidden" id="blockchain_gas_amount" name="blockchain_gas_amount">

      <div style="max-width:500px; margin:0 auto;">

        <div class="form-group mb-3">
          <label>Pay Balance (ETH)</label>
          <input type="text" id="amount" name="amount" value="{{ payments.balance|default:'0' }}" readonly
            class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100" id="pay-button">
          Pay with MetaMask
        </button>

      </div>
    </form>

    <div id="status-msg" class="text-center mt-3"></div>

  </div>

  <script>

    // ===============================
    // SAFE CONTRACT LOADING
    // ===============================
    let contractAddress = "{{ contract_address|escapejs }}";

    let contractABI;
    try {
      contractABI = JSON.parse('{{ contract_abi_json|escapejs|default:"[]" }}');
    } catch (e) {
      console.error("ABI parsing failed:", e);
      contractABI = [];
    }

    console.log("Contract Address:", contractAddress);
    console.log("Contract ABI:", contractABI);

    const form = document.getElementById("payment-form");
    const statusDiv = document.getElementById("status-msg");

    // ===============================
    // FORM SUBMIT HANDLER
    // ===============================
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      try {

        // ===========================
        // 1. CHECK METAMASK
        // ===========================
        if (typeof window.ethereum === "undefined") {
          alert("MetaMask not detected. Please install it.");
          return;
        }

        console.log("MetaMask detected");

        // ===========================
        // 2. REQUEST ACCOUNTS (THIS OPENS POPUP)
        // ===========================
        statusDiv.innerText = "Opening MetaMask...";

        const accounts = await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        const wallet = accounts[0];
        console.log("Wallet:", wallet);

        document.getElementById("wallet_address").value = wallet;

        // ===========================
        // 3. VALIDATE AMOUNT
        // ===========================
        const amountEth = document.getElementById("amount").value;

        if (!amountEth || parseFloat(amountEth) <= 0) {
          alert("Invalid amount");
          return;
        }

        const web3 = new Web3(window.ethereum);

        const amountWei = web3.utils.toWei(amountEth.toString(), "ether");

        // ===========================
        // 4. CONTRACT CHECK
        // ===========================
        if (!contractAddress || contractABI.length === 0) {
          alert("Contract not loaded properly");
          return;
        }

        const contract = new web3.eth.Contract(contractABI, contractAddress);

        // ===========================
        // 5. CREATE TX ID
        // ===========================
        const bookingId = document.querySelector('[name="booking_id"]').value;
        const txId = `TXN-${bookingId}-${Date.now()}`;

        document.getElementById("transaction_id").value = txId;

        // ===========================
        // 6. STRUCT FOR BLOCKCHAIN
        // ===========================
        const paymentStruct = {
          quote_request_id: String(document.querySelector('[name="quote_request_id"]').value),
          transaction_id: String(txId),
          payment_type: "ETH",
          amount: String(amountWei),
          amount_purpose: "payment_balance",
          blockchain_gas_amount: "0",
          source_wallet: wallet,
          status: "completed",
          created_at: String(Math.floor(Date.now() / 1000)),
          created_by: "{{ request.user.username }}",
          payment_email_sent: true,
          user_id: "{{ request.user.id }}",
          transaction_hash: "",
          confirmed_at: "0"
        };

        // ===========================
        // 7. SEND TO METAMASK (THIS OPENS CONFIRMATION)
        // ===========================
        statusDiv.innerText = "Waiting for MetaMask confirmation...";

        const receipt = await contract.methods.createPayment(paymentStruct)
          .send({
            from: wallet,
            value: amountWei
          });

        console.log("Receipt:", receipt);

        // ===========================
        // 8. GAS CALC
        // ===========================
        const gasUsed = BigInt(receipt.gasUsed);
        const gasPrice = BigInt(receipt.effectiveGasPrice || 0);
        const gasFeeWei = gasUsed * gasPrice;

        document.getElementById("blockchain_gas_amount").value = gasFeeWei.toString();
        document.getElementById("transaction_hash").value = receipt.transactionHash;

        statusDiv.innerText = "Payment successful ✔";

        // ===========================
        // 9. SEND TO DJANGO
        // ===========================
        const formData = new FormData(form);

        const response = await fetch("{% url 'payments:create_blockchain_payment' %}", {
          method: "POST",
          headers: {
            "X-CSRFToken": formData.get("csrfmiddlewaretoken")
          },
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = "{% url 'payments:success' %}?transaction_id=" + txId;
        } else {
          alert("Backend failed: " + (data.error || "Unknown error"));
        }

      } catch (err) {
        console.error("FULL ERROR:", err);
        alert("MetaMask error: " + err.message);
        statusDiv.innerText = "Failed. Check console.";
      }

    });

  </script>
</body>

</html>
